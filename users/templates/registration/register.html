<!DOCTYPE html>
<html>
<head>
    <title>Register - CineSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base Setup */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #111; color: white; font-family: sans-serif; 
        }

        /* The Netflix-Style Animated Grid*/
        #background-grid {
            position: absolute; top: -50%; left: -10%; width: 120%; height: 200%;
            display: flex; gap: 15px; 
            transform: rotate(-8deg);
            z-index: 0;
        }

        .scroll-column {
            display: flex; flex-direction: column; gap: 15px; width: 220px;
            animation: scroll-up 40s linear infinite;
        }

        .scroll-column:nth-child(even) {
            animation: scroll-down 45s linear infinite;
        }

        .poster-img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }

        @keyframes scroll-up { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scroll-down { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }

        /* The Dark Overlay*/
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.6) 50%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
        }

        /* The Frosted Glass Register Box */
        /* Increased max-width slightly to accommodate Django's longer password text */
        .login-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 2;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(16px);           
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px; padding: 40px; width: 90%; max-width: 500px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); text-align: center;
            max-height: 90vh; /* Prevents box from being taller than screen */
            overflow-y: auto; /* Adds a scrollbar inside the glass if screen is too small */
        }

        /* Hide scrollbar for the glass card */
        .glass-card::-webkit-scrollbar { display: none; }
        .glass-card { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card h1 { font-weight: bold; color: #0dcaf0; margin-bottom: 5px; }
        .glass-card p { color: #ccc; margin-bottom: 25px; font-size: 0.95rem; }

        /*FORCE STYLING ON DJANGO'S DEFAULT FORM */
        .glass-card form { text-align: left; }
        
        .glass-card label {
            font-size: 0.9rem; color: #aaa; margin-top: 10px; margin-bottom: 3px; font-weight: 500;
        }
        
        .glass-card input {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid #444; 
            color: white; padding: 10px 12px; border-radius: 6px; transition: border 0.2s;
        }
        
        .glass-card input:focus {
            outline: none; border-color: #0dcaf0; background: rgba(0,0,0,0.7);
        }

        /* Styling Django's annoying bullet point help text */
        .glass-card .helptext, .glass-card ul {
            font-size: 0.75rem; color: #888; margin-top: 5px; margin-bottom: 10px;
            padding-left: 20px; list-style-type: square;
        }

        .glass-card .errorlist { color: #ff4d4d; list-style-type: none; padding-left: 0; font-weight: bold; }

        .btn-success { 
            background-color: #198754; border: none; font-weight: bold; 
            width: 100%; padding: 12px; margin-top: 25px; transition: background 0.2s;
        }
        .btn-success:hover { background-color: #157347; }
    </style>
</head>
<body>

    <div id="background-grid"></div>
    <div class="overlay"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <h1>Join CineSense</h1>
            <p>Create your account to unlock personalized recommendations.</p>
            
            <form method="POST">
                {% csrf_token %}
                
                {{ form.as_p }}
                
                <button type="submit" class="btn btn-success">Create Account</button>
            </form>
            
            <div class="mt-4">
                <span class="text-muted">Already have an account?</span>
                <a href="{% url 'login' %}" class="text-info text-decoration-none fw-bold ms-1">Sign in here</a>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = 'dec1382fbb89751f2f231fee7ec947e5';
        const grid = document.getElementById('background-grid');
        const columns = 8; 
        const postersPerColumn = 10; 

        fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}&language=en-US&page=2`) // Changed to page=2 for different movies!
            .then(response => response.json())
            .then(data => {
                let movies = data.results.filter(m => m.poster_path);
                
                while(movies.length < columns * postersPerColumn) {
                    movies = movies.concat(movies);
                }

                let movieIndex = 0;

                for (let i = 0; i < columns; i++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'scroll-column';
                    
                    for (let j = 0; j < postersPerColumn; j++) {
                        const img = document.createElement('img');
                        img.src = `https://image.tmdb.org/t/p/w500${movies[movieIndex % movies.length].poster_path}`;
                        img.className = 'poster-img';
                        colDiv.appendChild(img);
                        movieIndex++;
                    }
                    
                    colDiv.innerHTML += colDiv.innerHTML;
                    grid.appendChild(colDiv);
                }
            })
            .catch(err => console.error("Error loading background:", err));
    </script>
</body>
</html>
