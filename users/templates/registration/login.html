<!DOCTYPE html>
<html>
<head>
    <title>Login - CineSense</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base Setup */
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background-color: #111; color: white; font-family: sans-serif; 
        }

        /* The Netflix-Style Animated Grid */
        #background-grid {
            position: absolute; top: -50%; left: -10%; width: 120%; height: 200%;
            display: flex; gap: 15px; 
            transform: rotate(-8deg); /* Gives it that dynamic, angled cinematic look */
            z-index: 0;
        }

        .scroll-column {
            display: flex; flex-direction: column; gap: 15px; width: 220px;
            animation: scroll-up 40s linear infinite;
        }

        /* Alternate columns scroll the opposite direction for a cooler effect */
        .scroll-column:nth-child(even) {
            animation: scroll-down 45s linear infinite;
        }

        .poster-img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }

        @keyframes scroll-up { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        @keyframes scroll-down { 0% { transform: translateY(-50%); } 100% { transform: translateY(0); } }

        /* The Dark Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.5) 50%, rgba(0,0,0,0.9) 100%);
            z-index: 1;
        }

        /* The Frosted Glass Login Box */
        .login-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 2;
        }

        .glass-card {
            background: rgba(0, 0, 0, 0.45);       /* CHANGED: Now a dark, semi-transparent black */
            backdrop-filter: blur(16px);           /* Keeps the frosted glass blur */
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08); /* CHANGED: Slightly dimmer border */
            border-radius: 15px; padding: 40px; width: 100%; max-width: 420px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); /* CHANGED: Harsher shadow to separate it from the background */
            text-align: center;
        }

        .glass-card h1 { font-weight: bold; color: #0dcaf0; margin-bottom: 5px; }
        .glass-card p { color: #ccc; margin-bottom: 30px; font-size: 0.95rem; }

        /* --- Form Inputs & Buttons --- */
        .form-control { background: rgba(0,0,0,0.5); border: 1px solid #444; color: white; padding: 12px; }
        .form-control:focus { background: rgba(0,0,0,0.7); border-color: #0dcaf0; color: white; box-shadow: none; }
        .form-label { font-size: 0.9rem; color: #aaa; }
        .btn-primary { background-color: #0dcaf0; border: none; color: black; font-weight: bold; width: 100%; padding: 12px; margin-top: 20px;}
        .btn-primary:hover { background-color: #0babbc; color: black;}
    </style>
</head>
<body>

    <div id="background-grid"></div>
    
    <div class="overlay"></div>

    <div class="login-wrapper">
        <div class="glass-card">
            <h1>CineSense</h1>
            <p>Your personal hybrid recommendation engine. <br>Log in to discover your next favorite movie.</p>
            
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3 text-start">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary">Sign In</button>
            </form>
            
            <div class="mt-4">
                <span class="text-muted">Don't have an account?</span>
                <a href="{% url 'register' %}" class="text-info text-decoration-none fw-bold ms-1">Create one here</a>
            </div>
        </div>
    </div>

    <script>
        const TMDB_API_KEY = 'dec1382fbb89751f2f231fee7ec947e5';
        const grid = document.getElementById('background-grid');
        const columns = 8; 
        const postersPerColumn = 10; 

        // Fetch the current trending/popular movies
        fetch(`https://api.themoviedb.org/3/movie/popular?api_key=${TMDB_API_KEY}&language=en-US&page=1`)
            .then(response => response.json())
            .then(data => {
                let movies = data.results.filter(m => m.poster_path);
                
                // Duplicate the array if we need more posters to fill the big screen
                while(movies.length < columns * postersPerColumn) {
                    movies = movies.concat(movies);
                }

                let movieIndex = 0;

                // Build the columns
                for (let i = 0; i < columns; i++) {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'scroll-column';
                    
                    // Add posters to the column
                    for (let j = 0; j < postersPerColumn; j++) {
                        const img = document.createElement('img');
                        img.src = `https://image.tmdb.org/t/p/w500${movies[movieIndex % movies.length].poster_path}`;
                        img.className = 'poster-img';
                        colDiv.appendChild(img);
                        movieIndex++;
                    }
                    
                    // Duplicate the posters inside the column so the CSS animation loops seamlessly
                    colDiv.innerHTML += colDiv.innerHTML;
                    grid.appendChild(colDiv);
                }
            })
            .catch(err => console.error("Error loading background:", err));
    </script>
</body>
</html>
