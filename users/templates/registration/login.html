<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>CineSense | Login</title>
</head>
<body class="bg-dark text-white d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card bg-secondary text-white p-4 shadow-lg border-0" style="width: 400px; border-radius: 15px;">
        <h2 class="text-center mb-4 fw-bold">Login to CineSense</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="form-label text-light">Username</label>
                <input type="text" name="username" class="form-control bg-dark text-white border-0" placeholder="Enter Username" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label text-light">Password</label>
                <input type="password" name="password" class="form-control bg-dark text-white border-0" placeholder="Enter Password" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Sign In</button>
        </form>
        
        {% if form.errors %}
            <div class="alert alert-danger mt-3 text-center border-0">
                Invalid username or password. Please try again.
            </div>
        {% endif %}

        <div class="mt-4 text-center">
            <p class="text-light mb-0">Don't have an account?</p>
            <a href="{% url 'register' %}" class="text-info text-decoration-none fw-bold">Create one here</a>
        </div>
        
    </div>
</body>
</html>
