<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>CineSense | Welcome</title>
</head>
<body class="bg-dark text-white">
    <div class="container mt-5">
        <h2 class="text-center">Welcome to CineSense!</h2>
        <p class="text-center text-secondary">Tell us what you like so we can start recommending.</p>
        
        <form method="POST" class="mt-4">
            {% csrf_token %}
            <h4>Pick Your Favorite Genres</h4>
            <div class="row row-cols-2 row-cols-md-4 g-3 mb-4">
                {% for genre in genres %}
                <div class="col">
                    <input type="checkbox" class="btn-check" id="{{ genre }}" name="genres" value="{{ genre }}">
                    <label class="btn btn-outline-primary w-100 py-3" for="{{ genre }}">{{ genre }}</label>
                </div>
                {% endfor %}
            </div>

            <div class="mb-4">
                <h4>Favorite Actors or Directors?</h4>
                <input type="text" name="stars" class="form-control bg-secondary text-white border-0" placeholder="e.g. Christopher Nolan, Tom Hardy">
            </div>

            <button type="submit" class="btn btn-success btn-lg w-100">Finish & See Movies</button>
        </form>
    </div>
</body>
</html>
